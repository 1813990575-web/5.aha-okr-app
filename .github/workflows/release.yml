name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Build ${{ matrix.arch }}
        run: npx electron-builder --mac ${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Sign app
        run: |
          APP_PATH="release/mac${{ matrix.arch == 'arm64' && '-arm64' || '' }}/AhaOKR.app"
          codesign --deep --force --sign "-" "$APP_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-build
          path: release/*/

  release:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create DMG files
        run: |
          mkdir -p final
          # Create arm64 DMG
          if [ -d "arm64-build/mac-arm64/AhaOKR.app" ]; then
            hdiutil create -volname "AhaOKR" -srcfolder "arm64-build/mac-arm64/AhaOKR.app" -ov -format UDZO "final/AhaOKR-arm64.dmg"
          fi
          # Create x64 DMG
          if [ -d "x64-build/mac/AhaOKR.app" ]; then
            hdiutil create -volname "AhaOKR" -srcfolder "x64-build/mac/AhaOKR.app" -ov -format UDZO "final/AhaOKR-x64.dmg"
          fi
          ls -la final/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: final/*.dmg
          name: AhaOKR ${{ github.ref_name }}
          body: |
            ## AhaOKR ${{ github.ref_name }}

            ### 安装说明
            - Apple Silicon (M1/M2/M3): 下载 `AhaOKR-arm64.dmg`
            - Intel Mac: 下载 `AhaOKR-x64.dmg`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
