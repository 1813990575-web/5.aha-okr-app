name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
      
      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=v$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: AhaOKR ${{ github.ref_name }}
          body: |
            ## AhaOKR ${{ github.ref_name }}

            ### 安装说明
            1. 根据你的 Mac 芯片选择对应版本：
               - Apple Silicon (M1/M2/M3): 下载 `AhaOKR-${{ steps.get_version.outputs.VERSION }}-arm64.dmg`
               - Intel Mac: 下载 `AhaOKR-${{ steps.get_version.outputs.VERSION }}-x64.dmg`
            2. 打开 dmg 文件，将应用拖到 Applications 文件夹
            3. 首次打开可能需要到 系统设置 > 隐私与安全性 中允许运行

            ### 系统要求
            - macOS 10.12 或更高版本
          draft: false
          prerelease: false
      
      - name: Upload ARM64 DMG
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/AhaOKR-${{ steps.get_version.outputs.VERSION }}-arm64.dmg
          asset_name: AhaOKR-${{ steps.get_version.outputs.VERSION }}-arm64.dmg
          asset_content_type: application/x-apple-diskimage
      
      - name: Upload Intel DMG
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./release/AhaOKR-${{ steps.get_version.outputs.VERSION }}-x64.dmg
          asset_name: AhaOKR-${{ steps.get_version.outputs.VERSION }}-x64.dmg
          asset_content_type: application/x-apple-diskimage
