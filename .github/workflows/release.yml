name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Build ${{ matrix.arch }}
        run: npx electron-builder --mac ${{ matrix.arch }} --publish never

      - name: Sign app
        run: codesign --deep --force --sign "-" "release/mac${{ matrix.arch == 'arm64' && '-arm64' || '' }}/AhaOKR.app"

      - name: Create DMG
        run: |
          mkdir -p final
          hdiutil create -volname "AhaOKR" -srcfolder "release/mac${{ matrix.arch == 'arm64' && '-arm64' || '' }}/AhaOKR.app" -ov -format UDZO "final/AhaOKR-${{ matrix.arch }}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-dmg
          path: final/*.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v1
        with:
          files: '*-dmg/*.dmg'
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
